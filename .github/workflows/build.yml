name: Build DataLaVista

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'build.sh'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Stage build outputs
        id: changes
        run: |
          git add DataLaVista.html DataLaVista-nojs.html DataLaVista-dev.html datalavista.js
          echo "changed=$(git diff --staged --quiet && echo 'false' || echo 'true')" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: rebuild outputs from src [skip ci]"
          git push
